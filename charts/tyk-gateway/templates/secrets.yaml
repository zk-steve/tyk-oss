{{- $analyticsRedis := include "tyk-gateway.analytics_redis" . | fromYaml -}}
{{- $analyticsSecretManagedExternally := true -}}
{{- if .Values.global.redis.analytics -}}
  {{- if not (($analyticsRedis.passSecret).name) -}}
    {{- $analyticsSecretManagedExternally = false -}}
  {{- end -}}
{{- end -}}
{{- if not (and .Values.global.secrets.useSecretName ((.Values.global.redis.passSecret).name) $analyticsSecretManagedExternally) -}}
apiVersion: v1
kind: Secret
metadata:
  name: secrets-{{ include "tyk-gateway.fullname" . }}
  labels:
    app: secrets-data-{{ include "tyk-gateway.fullname" . }}
    chart: {{ include "tyk-gateway.fullname" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
type: Opaque
stringData:
{{- if not ((.Values.global.redis.passSecret).name) }}
  redisPass: "{{ .Values.global.redis.pass }}"
  {{- if .Values.global.redis.enableSentinel }}
  redisSentinelPass: "{{ .Values.global.redis.sentinelPass }}"
  {{- end }}
{{- end }}
{{- if and .Values.global.redis.analytics (not (($analyticsRedis.passSecret).name)) }}
  analyticsRedisPass: "{{ $analyticsRedis.pass }}"
  {{- if $analyticsRedis.enableSentinel }}
  analyticsRedisSentinelPass: "{{ $analyticsRedis.sentinelPass }}"
  {{- end }}
{{- end }}

{{- if not (.Values.global.secrets.useSecretName) }}
  APISecret: "{{ .Values.global.secrets.APISecret }}"
{{- end -}}

{{- end }}
